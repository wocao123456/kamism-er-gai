server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /api/health { proxy_pass http://app:9527/health; proxy_http_version 1.1; proxy_set_header Host $host; }

    location /api/auth { proxy_pass http://app:9527/auth; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/admin { proxy_pass http://app:9527/admin; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/merchant { proxy_pass http://app:9527/merchant; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/apps { proxy_pass http://app:9527/apps; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/cards { proxy_pass http://app:9527/cards; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/activations { proxy_pass http://app:9527/activations; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/v1 { proxy_pass http://app:9527/v1; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/ts { proxy_pass http://app:9527/api/ts; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /api/keys { proxy_pass http://app:9527/api/keys; proxy_http_version 1.1; proxy_set_header Host $host; }
    
    location /api/ {
        proxy_pass http://app:9527/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

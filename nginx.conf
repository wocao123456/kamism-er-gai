server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Health check (no /api prefix)
    location = /health {
        proxy_pass http://app:9527/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Auth routes (no /api prefix)
    location /auth {
        proxy_pass http://app:9527/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # OAuth routes
    location /auth/oauth {
        proxy_pass http://app:9527/auth/oauth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Uploads (avatars, backgrounds)
    location /uploads {
        proxy_pass http://app:9527/uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API routes with /api prefix
    location /api/health {
        proxy_pass http://app:9527/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/auth {
        proxy_pass http://app:9527/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/admin {
        proxy_pass http://app:9527/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/merchant {
        proxy_pass http://app:9527/merchant;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/apps {
        proxy_pass http://app:9527/apps;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/cards {
        proxy_pass http://app:9527/cards;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/activations {
        proxy_pass http://app:9527/activations;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1 {
        proxy_pass http://app:9527/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/ts {
        proxy_pass http://app:9527/api/ts;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/keys {
        proxy_pass http://app:9527/api/keys;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/blacklist {
        proxy_pass http://app:9527/blacklist;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/agent {
        proxy_pass http://app:9527/agent;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/ {
        proxy_pass http://app:9527/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Fallback to SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}